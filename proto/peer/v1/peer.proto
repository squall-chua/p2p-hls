syntax = "proto3";

package peer.v1;

option go_package = "github.com/squall-chua/p2p-hls/proto/peer/v1;peerv1";

// Envelope is one control-channel message. Each WebRTC data-channel send carries
// exactly one Envelope (SCTP preserves message boundaries; no length prefix needed).
message Envelope {
  uint64 request_id = 1;
  oneof body {
    Handshake handshake = 2;
    Ping ping = 3;
    Pong pong = 4;
    Browse browse = 5;
    Catalog catalog = 6;
    GetMetadata get_metadata = 7;
    TitleMeta title_meta = 8;
    RequestAccess request_access = 9;
    AccessGranted access_granted = 10;
    Ack ack = 11;
    Error error = 12;
    GetPlaylist get_playlist = 13;
    Playlist playlist = 14;
    GetSegment get_segment = 15;
    Download download = 16;
    JoinParty join_party = 17;
    PartyWelcome party_welcome = 18;
    PartyInvite party_invite = 19;
    PartyState party_state = 20;
    PartyAudience party_audience = 21;
    LeaveParty leave_party = 22;
    PartyEnded party_ended = 23;
    SwarmHave swarm_have = 24;
    GetSwarmSegment get_swarm_segment = 25;
  }
}

// Handshake is exchanged once when the control channel opens.
message Handshake {
  uint32 protocol_version = 1;
  repeated string capabilities = 2;
}

message Ping { string nonce = 1; }
message Pong { string nonce = 1; }

message Browse {}

message Catalog { repeated TitleMeta titles = 1; }

message GetMetadata { string content_id = 1; }

message TitleMeta {
  string content_id = 1;
  string display_title = 2;
  int64 duration_ms = 3;
  string container = 4;
  string video_codec = 5;
  repeated string audio_codecs = 6;
  int32 width = 7;
  int32 height = 8;
  int64 size_bytes = 9;
  bool hls_compatible = 10;
  repeated SubtitleTrack subtitles = 11;
  bool party_live = 12;     // a live Watch Party exists for this Title on this Host
  int32 party_viewers = 13; // current Audience size (Viewers, excluding the Host)
  bytes thumbnail = 14;     // small poster JPEG (480px); empty when unavailable
}

message SubtitleTrack {
  string id = 1;       // "embedded:<index>" or "sidecar:<lang>"
  string language = 2; // ISO code or "und"
  string label = 3;
  string kind = 4;     // "text" | "image"
}

message RequestAccess { string message = 1; }
message AccessGranted {}
message Ack {}

message Error {
  Status status = 1;
  string detail = 2;
  enum Status {
    STATUS_UNSPECIFIED = 0;
    DENIED = 1;
    NOT_FOUND = 2;
    UNAVAILABLE = 3;
    INTERNAL = 4;
    BUSY = 5;
  }
}

// GetPlaylist requests a named playlist (e.g. "playlist.m3u8", "index.m3u8",
// "sub_eng.m3u8") for a Title. Small text response over the control channel.
message GetPlaylist {
  string content_id = 1;
  string name = 2;
}

message Playlist {
  bytes data = 1;
  string content_type = 2;
  bool complete = 3; // false while ffmpeg is still producing (growing playlist)
}

// GetSegment requests a named segment ("seg00003.ts", "sub_eng_0.vtt").
// The bytes return on the bulk channel, correlated by request_id.
message GetSegment {
  string content_id = 1;
  string name = 2;
}

// Download requests the original file bytes (streamed on the bulk channel).
message Download {
  string content_id = 1;
}

// JoinParty asks a Host to admit this Viewer to the live Watch Party for a Title.
// content_id is only the join reference; the Host answers with the current party_id.
message JoinParty { string content_id = 1; }

// PartyWelcome admits a Viewer: the assigned party_id, the current authoritative
// state, and the current Audience.
message PartyWelcome {
  string party_id = 1;
  PartyState initial = 2;
  PartyAudience audience = 3;
}

// PartyInvite is pushed by a Host to proactively invite a Node to a Watch Party.
message PartyInvite {
  string content_id = 1;
  string party_id = 2;
  string host_display = 3;
}

// PartyState is the Host's authoritative playback state at a sample instant.
// It is both the periodic heartbeat and the on-change event (highest seq wins).
message PartyState {
  string party_id = 1;
  bool playing = 2;
  int64 position_ms = 3;
  int64 host_clock_ms = 4; // reserved for the NTP fallback; unused by the RTT/2 model
  double rate = 5;
  uint64 seq = 6;
}

// PartyAudience is the current set of Viewers in a Watch Party.
message PartyAudience {
  string party_id = 1;
  repeated AudienceMember members = 2;
}

message AudienceMember {
  string node_id = 1;
  string display_name = 2;
}

// LeaveParty tells the Host this Viewer is leaving the Audience.
message LeaveParty { string party_id = 1; }

// PartyEnded tells Viewers the Host has stopped the Watch Party.
message PartyEnded {
  string party_id = 1;
  string reason = 2;
}

// SwarmHave is the gossip have-map: the windowed set of Segments the sender holds
// for a party, as base_index + bitmap (bit i set => has Segment base_index+i).
message SwarmHave {
  string party_id = 1;
  string rendition = 2;
  uint32 base_index = 3;
  bytes bitmap = 4;
  uint64 epoch = 5; // monotonic; receivers ignore lower-or-equal epochs
}

// GetSwarmSegment requests a cached Segment from a peer Viewer in the same party.
// The bytes return on the bulk channel, correlated by request_id (like GetSegment).
message GetSwarmSegment {
  string party_id = 1;
  string rendition = 2;
  string seg_name = 3;
}

syntax = "proto3";

package peer.v1;

option go_package = "github.com/squall-chua/p2p-hls/proto/peer/v1;peerv1";

// Envelope is one control-channel message. Each WebRTC data-channel send carries
// exactly one Envelope (SCTP preserves message boundaries; no length prefix needed).
message Envelope {
  uint64 request_id = 1;
  oneof body {
    Handshake handshake = 2;
    Ping ping = 3;
    Pong pong = 4;
    Browse browse = 5;
    Catalog catalog = 6;
    GetMetadata get_metadata = 7;
    TitleMeta title_meta = 8;
    RequestAccess request_access = 9;
    AccessGranted access_granted = 10;
    Ack ack = 11;
    Error error = 12;
    GetPlaylist get_playlist = 13;
    Playlist playlist = 14;
    GetSegment get_segment = 15;
    Download download = 16;
  }
}

// Handshake is exchanged once when the control channel opens.
message Handshake {
  uint32 protocol_version = 1;
  repeated string capabilities = 2;
}

message Ping { string nonce = 1; }
message Pong { string nonce = 1; }

message Browse {}

message Catalog { repeated TitleMeta titles = 1; }

message GetMetadata { string content_id = 1; }

message TitleMeta {
  string content_id = 1;
  string display_title = 2;
  int64 duration_ms = 3;
  string container = 4;
  string video_codec = 5;
  repeated string audio_codecs = 6;
  int32 width = 7;
  int32 height = 8;
  int64 size_bytes = 9;
  bool hls_compatible = 10;
  repeated SubtitleTrack subtitles = 11;
}

message SubtitleTrack {
  string id = 1;       // "embedded:<index>" or "sidecar:<lang>"
  string language = 2; // ISO code or "und"
  string label = 3;
  string kind = 4;     // "text" | "image"
}

message RequestAccess { string message = 1; }
message AccessGranted {}
message Ack {}

message Error {
  Status status = 1;
  string detail = 2;
  enum Status {
    STATUS_UNSPECIFIED = 0;
    DENIED = 1;
    NOT_FOUND = 2;
    UNAVAILABLE = 3;
    INTERNAL = 4;
  }
}

// GetPlaylist requests a named playlist (e.g. "playlist.m3u8", "index.m3u8",
// "sub_eng.m3u8") for a Title. Small text response over the control channel.
message GetPlaylist {
  string content_id = 1;
  string name = 2;
}

message Playlist {
  bytes data = 1;
  string content_type = 2;
  bool complete = 3; // false while ffmpeg is still producing (growing playlist)
}

// GetSegment requests a named segment ("seg00003.ts", "sub_eng_0.vtt").
// The bytes return on the bulk channel, correlated by request_id.
message GetSegment {
  string content_id = 1;
  string name = 2;
}

// Download requests the original file bytes (streamed on the bulk channel).
message Download {
  string content_id = 1;
}
